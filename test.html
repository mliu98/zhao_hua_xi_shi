<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>写意·梦幻花园 V2.0 (清晰前景版)</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #fefdfb; /* 极淡的奶油白纸张 */
        }

        #canvas-container {
            position: relative; width: 100vw; height: 100vh;
            /* 后期滤镜：主要用于模拟颜料厚涂的立体感，不加模糊 */
            filter: url(#paint-texture) contrast(1.05) brightness(1.01);
        }

        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        #mid-canvas { opacity: 0.8; /* 中景花海保持一定透明度 */ }

        .ui-panel {
            position: absolute; bottom: 30px; left: 30px; z-index: 100;
            font-family: "Optima", "PingFang SC", sans-serif;
            color: #5a4a42; letter-spacing: 2px;
        }

        button {
            background: rgba(255, 255, 255, 0.7); border: 1px solid #e0d7c7;
            padding: 12px 30px; border-radius: 30px; cursor: pointer;
            transition: all 0.3s; color: #5a4a42; backdrop-filter: blur(5px);
        }
        button:hover { background: #fff; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <svg style="display: none;">
        <defs>
            <filter id="paint-texture">
                <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="4" result="noise" />
                
                <feSpecularLighting in="noise" surfaceScale="5" specularConstant="0.8" specularExponent="35" lighting-color="#ffffff" result="spec">
                    <fePointLight x="600" y="-100" z="400" />
                </feSpecularLighting>
                
                <feComposite in="spec" in2="SourceGraphic" operator="in" result="impasto" />
                <feComposite in="SourceGraphic" in2="impasto" operator="arithmetic" k1="0.1" k2="0.9" k3="0.2" k4="0" />
            </filter>
        </defs>
    </svg>

    <div id="canvas-container">
        <canvas id="bg-canvas"></canvas>    <canvas id="mid-canvas"></canvas>   <canvas id="fg-canvas"></canvas>    </div>

    <div class="ui-panel">
        <p>LUMINOUS GARDEN / 光影花园</p>
        <button onclick="render()">重新点染花园</button>
    </div>

    <script>
        /**
         * 1. 梦幻写意色彩库 (HSL) - 提取自原图
         */
        const PALETTE = [
            // 蔷薇粉色系 (主调)
            {h: 335, s: 65, l: 88}, {h: 345, s: 55, l: 85}, {h: 355, s: 45, l: 92}, {h: 320, s: 50, l: 87},
            // 丁香紫/天青色系
            {h: 275, s: 45, l: 86}, {h: 260, s: 35, l: 88}, {h: 195, s: 40, l: 89}, {h: 210, s: 35, l: 92},
            // 奶油黄/薄荷绿系
            {h: 45, s: 65, l: 88},  {h: 55, s: 55, l: 90}, {h: 155, s: 35, l: 87}, {h: 170, s: 30, l: 91},
            // 前景重点色彩 (正红/艳黄)
            {h: 0, s: 80, l: 85},   {h: 355, s: 75, l: 80}, {h: 45, s: 90, l: 75}
        ];

        const bgCanvas = document.getElementById('bg-canvas');
        const bgCtx = bgCanvas.getContext('2d');
        const midCanvas = document.getElementById('mid-canvas');
        const midCtx = midCanvas.getContext('2d');
        const fgCanvas = document.getElementById('fg-canvas');
        const fgCtx = fgCanvas.getContext('2d');

        function init() {
            [bgCanvas, midCanvas, fgCanvas].forEach(c => {
                c.width = window.innerWidth;
                c.height = window.innerHeight;
            });
            render();
        }

        /**
         * 2. 核心算法：前景笔触渐变锐化
         * 用于前景，放弃全透视，增加中间的色块转折点
         */
        function createFgGradient(ctx, x, y, size, baseHsl) {
            const grad = ctx.createRadialGradient(x, y, 0, x, y, size);
            const { h, s, l } = baseHsl;

            // Level 1: 核心色 (较实，厚涂感)
            grad.addColorStop(0, `hsla(${h}, ${s + 10}%, ${l - 5}%, 1)`); // 核心加深
            
            // Level 2: 色块转折 (锐利，模仿刮刀压痕)
            grad.addColorStop(0.35, `hsla(${(h + 5) % 360}, ${s - 5}%, ${l + 2}%, 0.85)`);
            
            // Level 3: 环境光流动 (引入邻近色)
            const neighborH = Math.random() > 0.5 ? h + 30 : h - 30;
            grad.addColorStop(0.65, `hsla(${neighborH % 360}, ${s - 10}%, ${l + 5}%, 0.6)`);
            
            // Level 4: 边缘 (通透但清晰)
            grad.addColorStop(0.9, `hsla(${h}, ${s - 20}%, ${l + 5}%, 0.3)`);
            
            // Level 5: 消失 (Alpha 仍保留 0.1，防止过于毛玻璃)
            grad.addColorStop(1, `hsla(${h}, ${s}%, ${l}%, 0.1)`);
            
            return grad;
        }

        /**
         * 3. 绘制清晰的厚涂笔触
         */
        function drawImpastoStroke(ctx, x, y, size, color, useFgGradient = false) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(Math.random() * Math.PI * 2);
            
            // 每一个花瓣由 2-3 个重叠的不规则渐变图层组成，产生厚度
            for (let i = 0; i < 3; i++) {
                const offsetX = (Math.random() - 0.5) * size * 0.3;
                const offsetY = (Math.random() - 0.5) * size * 0.3;
                const s = size * (0.7 + Math.random() * 0.3);
                
                // 选择不同的渐变模式
                if (useFgGradient) {
                    ctx.fillStyle = createFgGradient(ctx, offsetX, offsetY, s, color);
                } else {
                    // 中景使用更通透的渐变
                    ctx.fillStyle = createMidGradient(ctx, offsetX, offsetY, s, color);
                }
                
                // 绘制不规则多边形（模拟水墨点染形态）
                ctx.beginPath();
                const points = 7;
                for (let j = 0; j < points; j++) {
                    const angle = (j / points) * Math.PI * 2;
                    const r = s * (0.8 + Math.random() * 0.4);
                    const px = Math.cos(angle) * r + offsetX;
                    const py = Math.sin(angle) * r + offsetY;
                    if (j === 0) ctx.moveTo(px, py);
                    else ctx.lineTo(px, py);
                }
                ctx.closePath();
                ctx.fill();
            }
            ctx.restore();
        }

        // 中景专用：全透视渐变
        function createMidGradient(ctx, x, y, size, baseHsl) {
            const grad = ctx.createRadialGradient(x, y, 0, x, y, size);
            const { h, s, l } = baseHsl;
            grad.addColorStop(0, `hsla(${h}, ${s}%, ${l}%, 0.8)`);
            grad.addColorStop(0.5, `hsla(${h}, ${s - 10}%, ${l + 5}%, 0.4)`);
            grad.addColorStop(1, `hsla(${h}, ${s}%, ${l}%, 0)`);
            return grad;
        }

        /**
         * 4. 核心渲染循环：错落有致的前景构图
         */
        function render() {
            // 清除画布并填充柔和底色
            [bgCtx, midCtx, fgCtx].forEach(ctx => {
                ctx.globalCompositeOperation = 'source-over';
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            });
            
            bgCtx.fillStyle = '#fefdfb';
            bgCtx.fillRect(0, 0, canvas.width, canvas.height);

            // === A. 远景大色场 ===
            for(let i=0; i<30; i++) {
                const x = Math.random() * bgCanvas.width;
                const y = Math.random() * bgCanvas.height;
                const color = PALETTE[Math.floor(Math.random() * PALETTE.length)];
                drawImpastoStroke(bgCtx, x, y, 200 + Math.random() * 300, color);
            }

            // === B. 中景梦幻花海 (保持 screen 模式让颜色透亮) ===
            midCtx.globalCompositeOperation = 'screen';
            const count = 350;
            for (let i = 0; i < count; i++) {
                const x = Math.random() * midCanvas.width;
                const y = Math.random() * midCanvas.height;
                const size = 15 + (y / canvas.height) * 45; // 透视：越向上越小
                const color = PALETTE[Math.floor(Math.random() * (PALETTE.length - 3))]; // 偏蔷薇粉色系
                drawImpastoStroke(midCtx, x, y, size, color);
            }

            // === C. 核心：清晰、错落的前景 (source-over 模式) ===
            fgCtx.globalCompositeOperation = 'source-over'; // 关键：普通叠加，不加模糊
            
            // 限制在屏幕底部的 1/6 区域
            const fgHeightRange = fgCanvas.height * (1/6);
            const fgStartY = fgCanvas.height - fgHeightRange;

            const fgColors = PALETTE.slice(-5); // 只使用蔷薇粉和重点色彩
            const fgPositions = []; // 用于错落采样

            for (let i = 0; i < 15; i++) {
                let x, y, size;
                let isValidPosition = false;
                let attempts = 0;

                // 简单的泊松盘采样：寻找错落点
                while(!isValidPosition && attempts < 15) {
                    x = Math.random() * fgCanvas.width;
                    y = fgStartY + Math.random() * fgHeightRange;
                    size = 50 + ( (y - fgStartY) / fgHeightRange ) * 80; // 越靠下越大

                    isValidPosition = true;
                    for (let pos of fgPositions) {
                        const dist = Math.sqrt(Math.pow(x - pos.x, 2) + Math.pow(y - pos.y, 2));
                        // 确保花朵不重叠
                        if (dist < size * 1.5) {
                            isValidPosition = false;
                            break;
                        }
                    }
                    attempts++;
                }

                if (isValidPosition) {
                    fgPositions.push({x, y});
                    const color = fgColors[Math.floor(Math.random() * fgColors.length)];
                    drawImpastoStroke(fgCtx, x, y, size, color, true); // 使用前景锐化渐变
                }
            }
        }

        window.addEventListener('resize', init);
        init();
    </script>
</body>
</html>
